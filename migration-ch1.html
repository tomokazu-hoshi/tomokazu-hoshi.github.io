        :root {

        }

        body {
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }

        .header {
            background-color: var(--primary-color);
            color: white;
            text-align: center;
            padding: 40px 20px;
        }

        .header h1 {
            margin: 0;
            font-size: 24px;
        }

        .header p {
            margin: 10px 0 0;
            font-size: 14px;
            opacity: 0.9;
        }

        .container {

            margin: 20px auto;
            padding: 0 15px;
        }

        .nav-back {
            display: block;
            margin-bottom: 20px;
            color: var(--primary-color);
            text-decoration: none;
            font-size: 14px;
        }

        h2 {

            margin-bottom: 15px;
        }

        .intro-text {
            margin-bottom: 30px;
            font-size: 15px;
        }

        /* ボックスリストのデザイン */
        .article-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .article-card {
            background-color: var(--box-bg);
            border-radius: 12px;
            display: flex;
            align-items: center;
            padding: 20px;
            text-decoration: none;
            color: var(--text-color);
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            transition: transform 0.2s;
        }

        .article-card:active {
            transform: scale(0.98);
        }

        .article-number {
            font-size: 24px;
            font-weight: bold;
            color: var(--accent-color);
            width: 40px;
            flex-shrink: 0;
            text-align: center;
            margin-right: 15px;
        }

        .article-title {
            flex-grow: 1;
            font-size: 15px;
            font-weight: 500;
            padding-right: 10px;
            line-height: 1.4;
        }

        .arrow {
            color: #ccc;
            font-size: 18px;
        }

        footer {
            text-align: center;
            padding: 40px 0;
            font-size: 13px;
            color: #888;
